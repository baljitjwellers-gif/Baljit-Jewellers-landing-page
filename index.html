<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Baljit Jewellers — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Jost',sans-serif;
      min-height:100vh;
      background:#7A0C0C;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
    }
    .card{
      background:#fff;
      width:100%;
      max-width:420px;
      border-radius:4px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
    }
    /* ── TOP MAROON HEADER ── */
    .card-header{
      background:#7A0C0C;
      padding:2.5rem 2rem 2rem;
      text-align:center;
    }
    .card-header img{
      width:110px;
      height:auto;
      display:block;
      margin:0 auto 1rem;
    }
    .card-header h1{
      font-family:'Cormorant Garamond',serif;
      font-size:1.5rem;
      font-weight:600;
      letter-spacing:0.15em;
      color:#E8C97A;
    }
    .card-header p{
      font-size:0.72rem;
      letter-spacing:0.12em;
      color:rgba(255,255,255,0.55);
      margin-top:0.3rem;
    }
    /* ── FORM BODY ── */
    .card-body{
      padding:2rem 2rem 2.5rem;
      background:#fff;
    }
    .card-body h2{
      font-family:'Cormorant Garamond',serif;
      font-size:1.3rem;
      font-weight:600;
      color:#1a1208;
      margin-bottom:0.25rem;
    }
    .card-body .sub{
      font-size:0.75rem;
      color:#999;
      letter-spacing:0.05em;
      margin-bottom:1.75rem;
    }
    .form-group{margin-bottom:1.15rem;}
    .form-group label{
      display:block;
      font-size:0.72rem;
      font-weight:500;
      letter-spacing:0.1em;
      text-transform:uppercase;
      color:#7A0C0C;
      margin-bottom:0.4rem;
    }
    .form-group input,
    .form-group select{
      width:100%;
      padding:0.78rem 0.9rem;
      border:1.5px solid #e5e5e5;
      border-radius:2px;
      font-family:'Jost',sans-serif;
      font-size:0.9rem;
      color:#1a1208;
      outline:none;
      transition:border-color 0.2s;
      background:#fafafa;
    }
    .form-group input:focus,
    .form-group select:focus{border-color:#7A0C0C;background:#fff;}
    .form-group input::placeholder{color:#bbb;}
    .btn{
      width:100%;
      padding:0.9rem;
      background:#7A0C0C;
      color:#E8C97A;
      font-family:'Jost',sans-serif;
      font-size:0.8rem;
      font-weight:500;
      letter-spacing:0.2em;
      text-transform:uppercase;
      border:none;
      border-radius:2px;
      cursor:pointer;
      transition:background 0.25s;
      margin-top:0.5rem;
    }
    .btn:hover{background:#9a1010;}
    .btn:disabled{opacity:0.65;cursor:not-allowed;}
    .btn-loader{
      display:none;
      width:16px;height:16px;
      border:2px solid #E8C97A;
      border-top-color:transparent;
      border-radius:50%;
      animation:spin 0.6s linear infinite;
      margin:0 auto;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .error-msg{
      display:none;color:#c0392b;
      font-size:0.76rem;margin-top:0.6rem;
    }
    /* ── SUCCESS ── */
    .success-wrap{
      display:none;
      text-align:center;
      padding:2rem 1rem;
    }
    .success-wrap .tick{
      font-size:2.5rem;margin-bottom:0.75rem;
    }
    .success-wrap h3{
      font-family:'Cormorant Garamond',serif;
      font-size:1.4rem;color:#7A0C0C;
    }
    .success-wrap p{
      font-size:0.82rem;color:#777;margin-top:0.5rem;line-height:1.6;
    }
    /* ── FOOTER STRIP ── */
    .card-footer{
      background:#f7f2ec;
      border-top:1px solid #ede8df;
      padding:1rem 2rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:0.5rem;
    }
    .card-footer span{
      font-size:0.7rem;
      color:#999;
      letter-spacing:0.06em;
    }
    .card-footer a{
      font-size:0.7rem;
      color:#7A0C0C;
      text-decoration:none;
      letter-spacing:0.06em;
    }
  </style>
</head>

        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX"/>
        </div>

          <label>Email Address</label>
          <input type="email" id="email" placeholder="yourname@email.com"/>

        <div class="form-group">
          <label>City</label>
          <input type="text" id="city" placeholder="Doraha, Ludhiana…"/>
        </div>

          <label>Interested In</label>
          <select id="interest">
            <option value="">— Select —</option>

          </select>

          <span id="btnText">Submit</span>

  <script>
    // ➡️ PASTE YOUR GOOGLE APPS SCRIPT URL BELOW
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxg1sqCTalaKApSN7nNYferUmqCMufwVy0sGUTSGXHjWIv8A0_4bwJ4f8hRF5uN_rrx/exec";

    async function submitForm() {
      const btn      = document.getElementById('submitBtn');
      const btnText  = document.getElementById('btnText');
      const loader   = document.getElementById('btnLoader');
      const errorMsg = document.getElementById('errorMsg');

      const fullName = document.getElementById('fullName').value.trim();
      const phone    = document.getElementById('phone').value.trim();

      if (!fullName || !phone) {
        errorMsg.textContent = '⚠ Full Name and Phone Number are required.';
        errorMsg.style.display = 'block';
        return;
      }

      const data = {
        timestamp : new Date().toLocaleString('en-IN', {timeZone:'Asia/Kolkata'}),
        fullName,
        phone,
        email    : document.getElementById('email').value.trim(),
        city     : document.getElementById('city').value.trim(),
        interest : document.getElementById('interest').value,
      };

      btn.disabled = true;
      btnText.style.display = 'none';
      loader.style.display  = 'block';
      errorMsg.style.display = 'none';

      if (SHEET_URL === "https://script.google.com/macros/s/AKfycbwPP-ibFrj05hxSMLUHNtysFSAGA3G7Fkl__J-hWKoJBAnRR0YCOiWz4ifeUWMW72OB/exec") {
        setTimeout(() => showSuccess(), 1000);
        return;
      }

      try {
        await fetch(SHEET_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(data),
        });
        showSuccess();
      } catch(err) {
        btn.disabled = false;
        btnText.style.display = 'block';
        loader.style.display  = 'none';
        errorMsg.textContent  = '⚠ Could not connect. Please try again.';
        errorMsg.style.display = 'block';
      }
    }

    function showSuccess() {
      document.getElementById('formWrap').style.display  = 'none';
      document.getElementById('successWrap').style.display = 'block';
    }
  </script>
